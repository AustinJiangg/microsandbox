syntax = "proto3";

// Package orchestrator is the gRPC contract between the api (the caller) and the
// per-machine orchestrator (the server). It mirrors E2B's orchestrator SandboxService
// (e2b-dev/infra: packages/orchestrator/orchestrator.proto). Stage 8b introduces this
// seam: the api stops calling the VM logic in-process and instead invokes it over gRPC,
// so the two could later live on different machines -- exactly E2B's api -> orchestrator
// boundary. See docs/STAGE8_DESIGN.md.
package orchestrator;

// go_package is the Go import path the generated code belongs to. The codegen script
// (scripts/gen-proto.sh) passes --go_opt=module=microsandbox/services, which strips that
// module prefix to decide the on-disk location -> services/pkg/grpc/orchestrator/.
option go_package = "microsandbox/services/pkg/grpc/orchestrator";

import "google/protobuf/empty.proto"; // the well-known empty message, for RPCs with no useful payload

// SandboxService is the VM lifecycle API the api calls over gRPC. Stage 8 ported the three
// lifecycle verbs the HTTP control plane already had; Stage 26 adds Pause / Resume, the pair
// E2B uses to move a sandbox off a node -- there is no server-driven migration loop, a sandbox
// relocates by being paused (checkpointed to object storage) and resumed elsewhere. (E2B also
// has Checkpoint / ListCachedBuilds; those stay out.)
service SandboxService {
  // Create boots a sandbox (cold start, or snapshot restore which is warm-pool
  // eligible) and returns only once it has been health-probed -- "ready on delivery".
  rpc Create(SandboxCreateRequest) returns (SandboxCreateResponse);

  // Delete kills the sandbox's VM and frees its resources. Unknown id is an error.
  rpc Delete(SandboxDeleteRequest) returns (google.protobuf.Empty);

  // List returns the ids of the sandboxes this orchestrator currently holds.
  rpc List(google.protobuf.Empty) returns (SandboxListResponse);

  // Pause checkpoints a running sandbox to object storage and frees its node, so it can be
  // Resumed later -- possibly on a DIFFERENT node (Stage 26). E2B's real Pause snapshots the
  // live VM (memfile + rootfs diff); ours reuses the Stage 20/22 producer and is deferred, so
  // the real orchestrator returns Unimplemented -- what Stage 26 delivers is the relocation
  // SCHEDULING (the api-side pause/resume + drain-aware re-placement), verified in process.
  // Unknown id is an error.
  rpc Pause(SandboxPauseRequest) returns (google.protobuf.Empty);

  // Resume restores a previously paused sandbox on THIS node from its object-storage checkpoint,
  // under the same id, and returns once it is healthy. The api chooses which node to call --
  // origin-affinity with a drain-aware fallback -- so a sandbox paused on a now-draining node
  // resumes elsewhere.
  rpc Resume(SandboxResumeRequest) returns (SandboxResumeResponse);
}

// SandboxConfig is what the api hands the orchestrator to shape a new sandbox.
//
// The field numbers (= 1, = 2, ...) are the *wire identity* of each field: protobuf
// encodes them, not the names, so a number must never change or be reused once shipped
// (that is how old and new builds stay compatible). Names are free to change.
message SandboxConfig {
  string template = 1;     // template/image name; "" means the default image
  bool from_snapshot = 2;  // true: restore from the template's snapshot (fast, pool-eligible)
  uint32 vcpu = 3;         // 0 = let the orchestrator pick its default (1)
  uint32 mem_mb = 4;       // 0 = orchestrator default (512)
}

message SandboxCreateRequest { SandboxConfig config = 1; }
message SandboxCreateResponse { string sandbox_id = 1; } // the "sb_..." id, already healthy
message SandboxDeleteRequest { string sandbox_id = 1; }
message SandboxListResponse { repeated string sandbox_ids = 1; } // repeated = a list/slice

// Pause writes the checkpoint's artifacts under build_id -- an api-minted fresh build id, so
// the id authority stays with the api (which owns the catalog + store), matching E2B's
// UpsertSnapshot -> SandboxPauseRequest{BuildId} (Stage 26R). A paused sandbox is then just
// another build id in object storage, restored like any other.
message SandboxPauseRequest {
  string sandbox_id = 1;
  string build_id = 2;
}
// Resume restores a specific id (kept stable across pause/resume, so the catalog route and the
// api's metadata row stay keyed by it) under the sandbox's config (template + resources), from
// the checkpoint the api recorded at pause time (snapshot_build_id, Stage 26R).
message SandboxResumeRequest {
  string sandbox_id = 1;
  SandboxConfig config = 2;
  string snapshot_build_id = 3;
}
message SandboxResumeResponse { string sandbox_id = 1; } // the restored, already-healthy id
