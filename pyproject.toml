[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "microsandbox"
version = "0.1.0"
description = "一个从零实现、逐步逼近 E2B 的学习用代码沙箱"
readme = "README.md"
requires-python = ">=3.11"
# 阶段 0/1 都保持零运行时依赖：阶段 1 调 Docker 走 docker CLI 子进程而非
# docker-py（同步库进 asyncio daemon 反而绕）。后续阶段按需添加并写明理由。
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
microsandbox-daemon = "microsandbox.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/microsandbox"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
